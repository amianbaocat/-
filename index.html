    relationship: "感情裡是溫柔但可能令人窒息的伴侶。他愛你的方式是全方位的照顧，但他的照顧裡帶著佔有——他需要你需要他，所以他可能無意識地讓你變得依賴他。長期下來，伴侶可能失去獨立性，而他也會因為被需要過度而精疲力竭。",
    work: "在需要教育、照顧、引導的工作裡非常強。老師、諮詢師、醫療、社工——他天生知道怎麼讓人感覺被支持。缺點是容易燃燒自己，因為他很難拒絕需要幫助的人，邊界感不足。",
    interaction: "跟比肩相處，比肩的獨立性會讓正印感到受挫，因為比肩不需要他的照顧。跟七殺相處，正印能夠滋養七殺，七殺的剛烈在正印面前會軟化，是一種互補。跟偏財相處，偏財的流動性讓正印感到不安，因為正印需要穩定的依附關係。",

];

const tabs = ["核心欲望","對周圍人的影響","感情關係","工作社會","十神互動","強弱差異"];
const tabKeys = ["desire","impact","relationship","work","interaction","strength"];

function App() {
  const [selected, setSelected] = React.useState(0);
  const [tab, setTab] = React.useState(0);
  const s = data[selected];

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"20px 16px 12px",borderBottom:"1px solid #2a2a32"}}>
        <div style={{fontSize:"10px",letterSpacing:"3px",color:"#888",marginBottom:"4px"}}>十神百科</div>
        <div style={{fontSize:"20px",fontWeight:"700",color:"#f0e8d8"}}>命理人格圖鑑</div>
      </div>
      <div style={{display:"flex",flex:1}}>
        <div style={{width:"70px",borderRight:"1px solid #2a2a32",flexShrink:0,overflowY:"auto"}}>
          {data.map((d,i) => (
            <div key={i} onClick={()=>{setSelected(i);setTab(0);}} style={{padding:"12px 0",textAlign:"center",cursor:"pointer",borderLeft:selected===i?`3px solid ${d.color}`:"3px solid transparent",background:selected===i?"#22222a":"transparent"}}>
              <div style={{fontSize:"14px",marginBottom:"3px"}}>{d.symbol}</div>
              <div style={{fontSize:"10px",color:selected===i?d.color:"#666",lineHeight:"1.3"}}>{d.name}</div>
            </div>
          ))}
        </div>
        <div style={{flex:1,padding:"20px 16px",overflowY:"auto"}}>
          <div style={{marginBottom:"16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
              <div style={{fontSize:"24px"}}>{s.symbol}</div>
              <div>
                <div style={{fontSize:"22px",fontWeight:"700",color:s.color}}>{s.name}</div>
                <div style={{fontSize:"12px",color:"#888",marginTop:"2px"}}>「{s.core}」</div>
              </div>
            </div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"16px"}}>
            {tabs.map((t,i) => (
              <div key={i} onClick={()=>setTab(i)} style={{padding:"5px 10px",borderRadius:"20px",fontSize:"11px",cursor:"pointer",background:tab===i?s.color:"#2a2a32",color:tab===i?"#fff":"#888"}}>
                {t}
              </div>
            ))}
          </div>
          <div style={{background:"#22222a",borderRadius:"10px",padding:"18px",lineHeight:"1.9",fontSize:"14px",color:"#d0c8b8",borderLeft:`3px solid ${s.color}`}}>
            <div style={{fontSize:"11px",color:s.color,marginBottom:"10px",letterSpacing:"1px"}}>{tabs[tab]}</div>
            {s[tabKeys[tab]]}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
